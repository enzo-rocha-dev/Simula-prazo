<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Simulador de prazos</title>

<!-- ================= CSS ================= -->
<style>
body {
    font-family: Arial;
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

h2 {
    text-align: center;
}

input, select {
    width: 100%;
    height: 36px;
    padding: 6px 8px;
    margin: 6px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
}

input[type="date"] {
    appearance: none;
    -webkit-appearance: none;
}

button.main {
    width: 100%;
    height: 38px;
    background: #4a90e2;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

#resultado {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
}

.wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 20px;
}

.nav {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: #ddd;
    cursor: pointer;
}

.calendario {
    display: flex;
    gap: 10px;
    margin: 0 10px;
}

.mes {
    width: 180px;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 6px;
}

.titulo {
    text-align: center;
    font-size: 13px;
}

.dias-semana {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    font-size: 11px;
    text-align: center;
    margin: 4px 0;
    color: #666;
}

.grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
}

.dia {
    height: 22px;
    text-align: center;
    font-size: 12px;
    line-height: 22px;
    border-radius: 4px;
}

.periodo { background: #5182b1; }
.nao-util { background: #ffd148; }
</style>
</head>

<body>

<!-- ================= HTML ================= -->

<h2>Simulador de prazos 📅</h2>

<label>Modo de simulação</label>
<select id="modo" onchange="ajustarData()">
    <option value="forward">Quando chega a partir da data</option>
    <option value="backward">Quando pedir a partir da data</option>
</select>
<br></br>

<label>Data</label>
<input type="date" id="data">
<br></br>


<label>Prazo (Em dias)</label>
<input type="number" id="prazo">
<br></br>


<label>Tipo do prazo</label>
<select id="tipo">
    <option value="corridos">Corridos</option>
    <option value="uteis">Úteis</option>
    <option value="uteis_sabado">Úteis + sábado</option>
</select>
<br></br>


<button class="main" onclick="simular()">Simular</button>

<div id="resultado"></div>

<div class="wrapper">
    <button class="nav" onclick="mudarMes(-1)">◀</button>
    <div id="calendario" class="calendario"></div>
    <button class="nav" onclick="mudarMes(1)">▶</button>
</div>

<!-- ================= JS ================= -->
<script>

let inicio = null;
let fim = null;
let offset = 0;
let tipoGlobal = "corridos";

const feriados = ["2026-04-21", "2026-05-01"];

/* Retorna a data atual no formato ISO (yyyy-mm-dd) */
function hojeISO() {
    return new Date().toISOString().split("T")[0];
}

/* Ajusta automaticamente o campo de data dependendo do modo selecionado */
function ajustarData() {
    const modo = document.getElementById("modo").value;
    const data = document.getElementById("data");

    if (modo === "forward") {
        data.value = hojeISO();
    } else {
        data.value = "";
    }
}

window.onload = () => {
    ajustarData();
};

/* Verifica se uma data é feriado */
function isFeriado(d) {
    return feriados.includes(d.toISOString().slice(0,10));
}

/* Define se um dia deve ser considerado útil conforme o tipo selecionado */
function isDiaUtil(d) {
    if (tipoGlobal === "corridos") return true;
    if (isFeriado(d)) return false;

    if (tipoGlobal === "uteis")
        return d.getDay() >= 1 && d.getDay() <= 5;

    if (tipoGlobal === "uteis_sabado")
        return d.getDay() >= 1 && d.getDay() <= 6;

    return true;
}

/* Função principal: calcula o período com base no modo, prazo e tipo */
function simular() {

    const modo = document.getElementById("modo").value;
    const dataInput = document.getElementById("data").value;
    const prazo = parseInt(document.getElementById("prazo").value);
    tipoGlobal = document.getElementById("tipo").value;

    if (!dataInput || !prazo) return;

    if (modo === "forward") {

        let atual = new Date(dataInput);
        let count = 0;

        while (count < prazo) {
            atual.setDate(atual.getDate() + 1);
            if (isDiaUtil(atual)) count++;
        }

        inicio = new Date(dataInput);
        fim = atual;

        resultado.innerHTML = `${format(inicio)} → ${format(fim)}`;

    } else {

        let alvo = new Date(dataInput);
        let atual = new Date(alvo);
        let count = 0;

        while (count < prazo) {
            atual.setDate(atual.getDate() - 1);
            if (isDiaUtil(atual)) count++;
        }

        inicio = atual;
        fim = alvo;

        resultado.innerHTML = `${format(inicio)} → ${format(fim)}`;
    }

    render();
}

/* Formata data para padrão brasileiro */
function format(d) {
    return d.toLocaleDateString('pt-BR');
}

/* Navega entre os meses do calendário */
function mudarMes(v) {
    offset += v;
    render();
}

/* Renderiza os 3 meses do calendário e pinta o período calculado */
function render() {

    const cal = document.getElementById("calendario");
    cal.innerHTML = "";

    const base = new Date();

    for (let m = 0; m < 3; m++) {

        let data = new Date(base.getFullYear(), base.getMonth() + m + offset, 1);

        let div = document.createElement("div");
        div.className = "mes";

        let titulo = document.createElement("div");
        titulo.className = "titulo";
        titulo.innerText = data.toLocaleString('pt-BR', {month:'short', year:'numeric'});
        div.appendChild(titulo);

        let semana = document.createElement("div");
        semana.className = "dias-semana";

        ["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"].forEach(d => {
            let el = document.createElement("div");
            el.innerText = d;
            semana.appendChild(el);
        });

        div.appendChild(semana);

        let grid = document.createElement("div");
        grid.className = "grid";

        let first = new Date(data.getFullYear(), data.getMonth(), 1);
        let start = (first.getDay() + 6) % 7;

        let last = new Date(data.getFullYear(), data.getMonth()+1, 0);

        let dia = 1;

        for (let i=0;i<42;i++) {

            let el = document.createElement("div");
            el.className = "dia";

            if (i >= start && dia <= last.getDate()) {

                let d = new Date(data.getFullYear(), data.getMonth(), dia);
                el.innerText = dia;

                if (inicio && fim && d >= inicio && d <= fim) {

                    if (isDiaUtil(d)) {
                        el.classList.add("periodo");
                    } else {
                        el.classList.add("nao-util");
                    }
                }

                dia++;
            }

            grid.appendChild(el);
        }

        div.appendChild(grid);
        cal.appendChild(div);
    }
}
</script>

</body>
</html>
